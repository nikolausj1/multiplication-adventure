name: LevelUpMath
options:
  bundleIdPrefix: com.levelup
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"          # iPhone + iPad (universal)
    DEVELOPMENT_TEAM: "6A4J2GTB6F"     # Justin Nikolaus (paid team — signing lasts a year)
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: "YES"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
    INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    # iPhone is landscape-locked too — the whole game (landscape map art,
    # side-by-side boss layouts) is built for a wide screen. Kids turn the
    # phone sideways. The challenge is the shorter height (~390pt), handled in
    # the views via compact vertical size class.
    INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    INFOPLIST_KEY_UIRequiresFullScreen: "YES"
    INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: "NO"   # offline app, no custom crypto — skips TestFlight compliance prompt

targets:
  LevelUpMath:
    type: application
    platform: iOS
    sources:
      - path: Sources/Engine
      - path: Sources/App
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levelup.adventure
        # Home-screen label — short so iPadOS doesn't truncate it. The full name
        # "Multiplication Adventure" lives in the App Store record / splash art.
        INFOPLIST_KEY_CFBundleDisplayName: "Multiplication"
        ASSETCATALOG_COMPILER_GENERATE_ASSET_SYMBOLS: "NO"
